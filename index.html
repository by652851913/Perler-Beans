<title>Dopamine Beads - 拼豆图纸生成器</title>
<style>
/* ===== CSS Reset & Variables ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --primary: #FF4D6D;
  --primary-dark: #E63950;
  --secondary: #FFD93D;
  --accent: #00F5D4;
  --accent-dark: #00C4A8;
  --bg-start: #1a1a2e;
  --bg-mid: #16213e;
  --bg-end: #0f3460;
  --surface: rgba(255,255,255,0.06);
  --surface-hover: rgba(255,255,255,0.1);
  --text: #f0f0f0;
  --text-muted: #a0a0b8;
  --text-bright: #ffffff;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 8px 32px rgba(0,0,0,0.3);
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}

/* ===== Base ===== */
body {
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
  background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-mid) 40%, var(--bg-end) 100%);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  overflow-x: hidden;
}

/* Animated background blobs */
.bg-blobs {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
}
.bg-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.25;
  animation: blobFloat 20s ease-in-out infinite;
}
.bg-blob:nth-child(1) {
  width: 500px; height: 500px;
  background: var(--primary);
  top: -150px; left: -100px;
  animation-delay: 0s;
}
.bg-blob:nth-child(2) {
  width: 400px; height: 400px;
  background: var(--secondary);
  top: 40%; right: -120px;
  animation-delay: -5s;
}
.bg-blob:nth-child(3) {
  width: 450px; height: 450px;
  background: var(--accent);
  bottom: -180px; left: 30%;
  animation-delay: -10s;
}
@keyframes blobFloat {
  0%, 100% { transform: translate(0,0) scale(1); }
  25% { transform: translate(60px,-40px) scale(1.08); }
  50% { transform: translate(-30px,50px) scale(0.94); }
  75% { transform: translate(-50px,-30px) scale(1.04); }
}

/* ===== Layout ===== */
.app-container {
  position: relative; z-index: 1;
  max-width: 1300px; margin: 0 auto; padding: 20px 24px 60px;
}

/* ===== Header ===== */
.header {
  text-align: center; padding: 40px 20px 30px;
}
.logo {
  display: inline-flex; align-items: center; gap: 12px;
  font-size: 2.4rem; font-weight: 900; letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--secondary), var(--primary), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.logo-icon { font-size: 2.8rem; -webkit-text-fill-color: initial; }
.tagline {
  margin-top: 8px; font-size: 1.05rem; color: var(--text-muted);
  font-weight: 400;
}

/* ===== Card ===== */
.card {
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius);
  padding: 28px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  transition: var(--transition);
}
.card-header {
  font-size: 1.15rem; font-weight: 700; margin-bottom: 18px;
  display: flex; align-items: center; gap: 8px;
}
.card-header .icon { font-size: 1.3rem; }

/* ===== Upload Zone ===== */
.upload-zone {
  border: 2px dashed rgba(255,255,255,0.2);
  border-radius: var(--radius);
  padding: 50px 30px;
  text-align: center;
  cursor: pointer;
  transition: var(--transition);
  background: rgba(255,255,255,0.02);
  position: relative;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--secondary);
  background: rgba(255,217,61,0.06);
  transform: translateY(-2px);
}
.upload-icon { font-size: 3.5rem; margin-bottom: 12px; display: block; }
.upload-text { font-size: 1.1rem; font-weight: 600; color: var(--text-bright); }
.upload-hint { font-size: 0.85rem; color: var(--text-muted); margin-top: 6px; }
.upload-zone input[type="file"] { position: absolute; top: 0; right: 0; bottom: 0; left: 0; inset: 0; opacity: 0; cursor: pointer; }

/* ===== Controls ===== */
.controls-row {
  display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
}
.control-group { display: flex; align-items: center; gap: 10px; }
.control-group label {
  font-size: 0.9rem; font-weight: 600; color: var(--text-muted);
  white-space: nowrap;
}
.resolution-btn {
  padding: 8px 18px; border-radius: 20px; border: 1.5px solid rgba(255,255,255,0.2);
  background: transparent; color: var(--text); cursor: pointer;
  font-size: 0.9rem; font-weight: 600; transition: var(--transition);
}
.resolution-btn:hover { border-color: var(--secondary); color: var(--secondary); }
.resolution-btn.active {
  background: var(--primary); border-color: var(--primary); color: #fff;
}
.resolution-custom {
  width: 80px; padding: 8px 12px; border-radius: 20px;
  border: 1.5px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.06);
  color: var(--text); font-size: 0.9rem; text-align: center;
  transition: var(--transition);
}
.resolution-custom:focus { outline: none; border-color: var(--accent); }

/* Toggle switches */
.toggle-group { display: flex; flex-wrap: wrap; gap: 12px; margin-left: auto; }
.toggle-item { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; color: var(--text-muted); cursor: pointer; }
.toggle-item input { accent-color: var(--primary); width: 16px; height: 16px; cursor: pointer; }

/* ===== Action Buttons ===== */
.btn {
  padding: 10px 24px; border-radius: 24px; border: none;
  font-size: 0.95rem; font-weight: 700; cursor: pointer;
  transition: var(--transition); display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff; box-shadow: 0 4px 16px rgba(255,77,109,0.35);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,77,109,0.5); }
.btn-accent {
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  color: #1a1a2e; box-shadow: 0 4px 16px rgba(0,245,212,0.25);
}
.btn-accent:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,245,212,0.4); }
.btn-outline {
  background: transparent; border: 1.5px solid rgba(255,255,255,0.25); color: var(--text);
}
.btn-outline:hover { border-color: var(--text-bright); background: var(--surface-hover); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

/* ===== Preview Panels ===== */
.panels {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
}
.panel {
  background: var(--surface);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.panel-title {
  padding: 14px 20px; font-size: 0.9rem; font-weight: 700;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; gap: 8px;
}
.panel-body {
  padding: 16px; display: flex; align-items: center; justify-content: center;
  min-height: 300px; background: rgba(0,0,0,0.15);
  position: relative; overflow: auto;
}
.panel-body canvas { max-width: 100%; height: auto; display: block; image-rendering: pixelated; }
.panel-body img { max-width: 100%; max-height: 400px; object-fit: contain; }

/* Bead grid specific */
.bead-grid-wrapper {
  overflow: auto; max-height: 600px;
  display: flex; align-items: flex-start; justify-content: center;
}
.bead-grid-wrapper canvas { image-rendering: pixelated; }

/* ===== Material List ===== */
.material-grid {
  display: flex; flex-wrap: wrap; gap: 6px;
  max-height: 400px; overflow-y: auto;
  padding: 4px;
}
.material-item {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.05); border-radius: 20px;
  padding: 5px 12px 5px 5px;
  font-size: 0.8rem; font-weight: 600;
  transition: var(--transition);
  cursor: default;
}
.material-item:hover { background: rgba(255,255,255,0.12); transform: scale(1.03); }
.material-swatch {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2);
  flex-shrink: 0;
}
.material-name { color: var(--text); max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.material-count { color: var(--secondary); margin-left: auto; }

.summary-stats {
  display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 16px;
}
.stat-item {
  background: rgba(255,255,255,0.05); border-radius: var(--radius-sm);
  padding: 14px 20px; text-align: center; min-width: 100px;
}
.stat-value { font-size: 1.6rem; font-weight: 900; color: var(--secondary); }
.stat-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }

/* ===== Empty State ===== */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text-muted);
}
.empty-state-icon { font-size: 3rem; display: block; margin-bottom: 12px; opacity: 0.5; }

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

/* ===== Toast ===== */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: var(--accent); color: #1a1a2e; padding: 12px 28px;
  border-radius: 28px; font-weight: 700; font-size: 0.9rem;
  z-index: 100; opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
  box-shadow: 0 4px 20px rgba(0,245,212,0.3);
}
.toast.show { opacity: 1; }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .header { padding: 24px 12px 16px; }
  .logo { font-size: 1.6rem; }
  .card { padding: 18px; }
  .panels { grid-template-columns: 1fr; }
  .controls-row { flex-direction: column; align-items: flex-start; }
  .toggle-group { margin-left: 0; }
}

/* ===== Color distance method selector ===== */
.method-select {
  padding: 6px 12px; border-radius: 16px; border: 1.5px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.06); color: var(--text); font-size: 0.85rem;
  cursor: pointer; transition: var(--transition);
}
.method-select:focus { outline: none; border-color: var(--accent); }
.method-select option { background: var(--bg-mid); color: var(--text); }
</style>
</head>

// COLOR SPACE UTILITIES
// ======================================================================

/** RGB → XYZ (sRGB, D65) */
function rgbToXyz(r, g, b) {
  let vr = r / 255, vg = g / 255, vb = b / 255;
  vr = vr > 0.04045 ? Math.pow((vr + 0.055) / 1.055, 2.4) : vr / 12.92;
  vg = vg > 0.04045 ? Math.pow((vg + 0.055) / 1.055, 2.4) : vg / 12.92;
  vb = vb > 0.04045 ? Math.pow((vb + 0.055) / 1.055, 2.4) : vb / 12.92;
  return [
    (vr * 0.4124564 + vg * 0.3575761 + vb * 0.1804375) * 100,
    (vr * 0.2126729 + vg * 0.7151522 + vb * 0.0721750) * 100,
    (vr * 0.0193339 + vg * 0.1191920 + vb * 0.9503041) * 100,
  ];
}

/** XYZ → CIELAB (D65) */
function xyzToLab(x, y, z) {
  const xn = 95.047, yn = 100.0, zn = 108.883;
  const fx = x / xn > 0.008856 ? Math.cbrt(x / xn) : (7.787 * (x / xn)) + (16 / 116);
  const fy = y / yn > 0.008856 ? Math.cbrt(y / yn) : (7.787 * (y / yn)) + (16 / 116);
  const fz = z / zn > 0.008856 ? Math.cbrt(z / zn) : (7.787 * (z / zn)) + (16 / 116);
  return [
    (116 * fy) - 16,
    500 * (fx - fy),
    200 * (fy - fz),
  ];
}

/** RGB → CIELAB */
function rgbToLab(r, g, b) {
  const [x, y, z] = rgbToXyz(r, g, b);
  return xyzToLab(x, y, z);
}

/** CIE76 ΔE (LAB Euclidean distance) */
function deltaE(lab1, lab2) {
  const dl = lab1[0] - lab2[0];
  const da = lab1[1] - lab2[1];
  const db = lab1[2] - lab2[2];
  return Math.sqrt(dl * dl + da * da + db * db);
}

/** Weighted RGB distance (human-perception weighted) */
function weightedRgbDist(r1, g1, b1, r2, g2, b2) {
  const rMean = (r1 + r2) / 2;
  const dr = r1 - r2, dg = g1 - g2, db = b1 - b2;
  return Math.sqrt(
    ((512 + rMean) * dr * dr) / 256 +
    4 * dg * dg +
    ((767 - rMean) * db * db) / 256
  );
}

/** Euclidean RGB distance */
function euclideanRgbDist(r1, g1, b1, r2, g2, b2) {
  const dr = r1 - r2, dg = g1 - g2, db = b1 - b2;
  return Math.sqrt(dr * dr + dg * dg + db * db);
}

// ======================================================================
// COLOR MATCHING ENGINE
// ======================================================================

// Pre-compute LAB values for the entire palette
const paletteLab = MARD_PALETTE.map(c => {
  const [L, A, B] = rgbToLab(c.rgb[0], c.rgb[1], c.rgb[2]);
  return { ...c, lab: [L, A, B] };
});

/**
 * Find the closest palette color to a given RGB value.
 * @param {number} r,g,b - pixel RGB
 * @param {string} method - 'lab' | 'weighted' | 'euclidean'
 * @returns {{ id, name, rgb }}
 */
function findClosestColor(r, g, b, method = 'lab') {
  let best = null;
  let bestDist = Infinity;

  if (method === 'lab') {
    const targetLab = rgbToLab(r, g, b);
    for (const c of paletteLab) {
      const d = deltaE(targetLab, c.lab);
      if (d < bestDist) { bestDist = d; best = c; }
    }
  } else if (method === 'weighted') {
    for (const c of MARD_PALETTE) {
      const d = weightedRgbDist(r, g, b, c.rgb[0], c.rgb[1], c.rgb[2]);
      if (d < bestDist) { bestDist = d; best = c; }
    }
  } else {
    for (const c of MARD_PALETTE) {
      const d = euclideanRgbDist(r, g, b, c.rgb[0], c.rgb[1], c.rgb[2]);
      if (d < bestDist) { bestDist = d; best = c; }
    }
  }
  return best;
}

/**
 * Load image from file.
 */
function loadImage(file) {
  return new Promise((resolve, reject) => {
    const ext = file.name.split('.').pop().toLowerCase();
    const validTypes = /image\/(jpeg|png|webp)/;
    const validExts = ['jpg', 'jpeg', 'png', 'webp'];
    if (!validTypes.test(file.type) && !validExts.includes(ext)) {
      reject(new Error('请上传 JPG / PNG / WebP 格式的图片'));
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => reject(new Error('图片加载失败'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('文件读取失败'));
    reader.readAsDataURL(file);
  });
}

/**
 * Resize & pixelate image to target grid size.
 * Returns 2D array of {r,g,b} pixels.
 */
function pixelateImage(img, targetSize) {
  // Determine output dimensions (maintaining aspect ratio)
  const ratio = img.width / img.height;
  let outW, outH;
  if (ratio >= 1) {
    outW = targetSize;
    outH = Math.max(1, Math.round(targetSize / ratio));
  } else {
    outH = targetSize;
    outW = Math.max(1, Math.round(targetSize * ratio));
  }

  // Draw resized image to offscreen canvas
  const canvas = document.createElement('canvas');
  canvas.width = outW;
  canvas.height = outH;
  const ctx = canvas.getContext('2d');
  // Use pixelated rendering
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(img, 0, 0, outW, outH);

  // Extract pixel data
  const imageData = ctx.getImageData(0, 0, outW, outH);
  const pixels = [];
  for (let y = 0; y < outH; y++) {
    const row = [];
    for (let x = 0; x < outW; x++) {
      const i = (y * outW + x) * 4;
      row.push({
        r: imageData.data[i],
        g: imageData.data[i + 1],
        b: imageData.data[i + 2],
        a: imageData.data[i + 3],
      });
    }
    pixels.push(row);
  }
  return { pixels, width: outW, height: outH };
}

/**
 * Map pixel grid to color grid.
 */
function mapToColors(pixelGrid, method) {
  const height = pixelGrid.length;
  const width = pixelGrid[0].length;
  const colorGrid = [];
  for (let y = 0; y < height; y++) {
    const row = [];
    for (let x = 0; x < width; x++) {
      const p = pixelGrid[y][x];
      // Treat fully transparent / near-white transparent as white
      if (p.a < 30) {
        row.push(paletteMap['C01']); // white for transparent
      } else {
        row.push(findClosestColor(p.r, p.g, p.b, method));
      }
    }
    colorGrid.push(row);
  }
  return colorGrid;
}

/**
 * Count materials from color grid.
 */
function countMaterials(colorGrid) {
  const counts = {};
  for (const row of colorGrid) {
    for (const cell of row) {
      counts[cell.id] = (counts[cell.id] || 0) + 1;
    }
  }
  // Sort by count descending
  const sorted = Object.entries(counts)
    .map(([id, count]) => ({ id, name: paletteMap[id]?.name || id, rgb: paletteMap[id]?.rgb || [128,128,128], count }))
    .sort((a, b) => b.count - a.count);
  return sorted;
}

// ======================================================================
// RENDERING
// ======================================================================

/**
 * Draw the bead grid canvas.
 */
function drawBeadGrid(canvas, colorGrid, { showGrid = true, showLabels = false } = {}) {
  const height = colorGrid.length;
  const width = colorGrid[0].length;

  // Determine cell size to fit in a reasonable canvas
  const maxCanvasSize = 750;
  const cellSize = Math.max(3, Math.floor(maxCanvasSize / Math.max(width, height)));
  const canvasW = width * cellSize;
  const canvasH = height * cellSize;

  canvas.width = canvasW;
  canvas.height = canvasH;
  const ctx = canvas.getContext('2d');

  // Fill cells
  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      const c = colorGrid[y][x];
      ctx.fillStyle = `rgb(${c.rgb[0]},${c.rgb[1]},${c.rgb[2]})`;
      ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);

      // Draw grid lines
      if (showGrid && cellSize >= 4) {
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(x * cellSize, y * cellSize, cellSize, cellSize);
      }

      // Draw color code label
      if (showLabels && cellSize >= 16) {
        ctx.fillStyle = getTextColor(c.rgb[0], c.rgb[1], c.rgb[2]);
        ctx.font = `${Math.max(7, cellSize * 0.45)}px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(c.id, x * cellSize + cellSize / 2, y * cellSize + cellSize / 2);
      }
    }
  }
  return { canvasW, canvasH, cellSize };
}

/**
 * Determine whether to use light or dark text on a background color.
 */
function getTextColor(r, g, b) {
  const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
  return luminance > 0.55 ? 'rgba(0,0,0,0.75)' : 'rgba(255,255,255,0.85)';
}

/**
 * Draw pixelated preview.
 */
function drawPixelatedPreview(canvas, pixelGrid) {
  const height = pixelGrid.length;
  const width = pixelGrid[0].length;
  const scale = Math.max(2, Math.floor(400 / Math.max(width, height)));

  canvas.width = width * scale;
  canvas.height = height * scale;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      const p = pixelGrid[y][x];
      ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${p.a / 255})`;
      ctx.fillRect(x * scale, y * scale, scale, scale);
    }
  }
}

function downloadCSV(materials, filename = 'material-list.csv') {
  // Add BOM for Excel UTF-8 compatibility
  let csv = '﻿色号,名称,数量(颗)\n';
  for (const m of materials) {
    csv += `${m.id},${m.name},${m.count}\n`;
  }
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const link = document.createElement('a');
  link.download = filename;
  link.href = URL.createObjectURL(blob);
  link.click();
  URL.revokeObjectURL(link.href);
}

    showToast('正在处理图片...');
    state.originalImage = await loadImage(file);
    console.log('✅ Image loaded:', state.originalImage.width, 'x', state.originalImage.height);
    await processAll();
    console.log('✅ processAll completed');
    showToast('✨ 拼豆图纸已生成！');
  } catch (err) {
    console.error('❌ handleFile error:', err);
    showToast('❌ ' + err.message);
  }
}

/** Run the full processing pipeline */
async function processAll() {
  if (!state.originalImage) {
    console.warn('⚠️ processAll called but no originalImage');
    return;
  }

  const img = state.originalImage;
  const size = state.gridSize;
  const method = state.matchMethod;

  // 1. Pixelate
  const { pixels, width, height } = pixelateImage(img, size);
  state.pixelGrid = pixels;

  // 2. Color mapping
  state.colorGrid = mapToColors(pixels, method);

  // 3. Count materials
  state.materials = countMaterials(state.colorGrid);

  // 4. Render everything
  renderAll(width, height);
}

/** Render all UI panels */
function renderAll(gridW, gridH) {
  // Show cards
  controlsCard.style.display = '';
  panelsContainer.style.display = '';
  materialsCard.style.display = '';

  gridInfo.textContent = `${gridW} × ${gridH} 格`;

  // ── Original image ──
  originalPanel.innerHTML = '';
  const origImg = document.createElement('img');
  origImg.src = state.originalImage.src;
  origImg.style.maxWidth = '100%';
  origImg.style.maxHeight = '400px';
  origImg.style.objectFit = 'contain';
  origImg.style.borderRadius = '8px';
  originalPanel.appendChild(origImg);

  // ── Pixelated preview ──
  pixelatedPanel.innerHTML = '';
  const pixCanvas = document.createElement('canvas');
  drawPixelatedPreview(pixCanvas, state.pixelGrid);
  pixelatedPanel.appendChild(pixCanvas);

  // ── Bead grid ──
  beadGridPanel.innerHTML = '';
  const beadCanvas = document.createElement('canvas');
  beadCanvas.id = 'beadCanvas';
  const { cellSize } = drawBeadGrid(beadCanvas, state.colorGrid, {
    showGrid: state.showGrid,
    showLabels: state.showLabels,
  });
  gridInfo.textContent = `${gridW} × ${gridH} 格 · 每格 ${cellSize}px`;
  beadGridPanel.appendChild(beadCanvas);

  // ── Material stats ──
  const totalBeads = state.materials.reduce((s, m) => s + m.count, 0);
  const uniqueColors = state.materials.length;
  summaryStats.innerHTML = `
    <div class="stat-item">
      <div class="stat-value">${totalBeads.toLocaleString()}</div>
      <div class="stat-label">总拼豆数</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">${uniqueColors}</div>
      <div class="stat-label">使用颜色数</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">${gridW}×${gridH}</div>
      <div class="stat-label">图纸尺寸</div>
    </div>
  `;

  // ── Material list ──
  materialGrid.innerHTML = '';
  for (const m of state.materials) {
    const item = document.createElement('div');
    item.className = 'material-item';
    item.innerHTML = `
      <div class="material-swatch" style="background:rgb(${m.rgb[0]},${m.rgb[1]},${m.rgb[2]})"></div>
      <span class="material-name" title="${m.id} ${m.name}">${m.id} ${m.name}</span>
      <span class="material-count">${m.count}颗</span>
    `;
    materialGrid.appendChild(item);
  }
}

// ── Upload events ──
uploadZone.addEventListener('click', () => {
  console.log('🖱️ Upload zone clicked, triggering file input');
  fileInput.click();
});
uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => { uploadZone.classList.remove('drag-over'); });
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  console.log('📥 Drop event, file:', file ? file.name : 'none');
  if (file) handleFile(file);
});
fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  console.log('📥 File input change, file:', file ? file.name : 'none');
  if (file) handleFile(file);
  fileInput.value = ''; // allow re-uploading same file
});

// ── Resolution buttons ──
$$('.resolution-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    $$('.resolution-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    customSizeInput.value = '';
    state.gridSize = parseInt(btn.dataset.size);
    processAll();
  });
});

// ── Custom size input ──
customSizeInput.addEventListener('change', () => {
  let val = parseInt(customSizeInput.value);
  if (isNaN(val) || val < 4) val = 64;
  if (val > 300) val = 300;
  customSizeInput.value = val;
  state.gridSize = val;
  $$('.resolution-btn').forEach(b => b.classList.remove('active'));
  processAll();
});

// ── Match method ──
matchMethodSelect.addEventListener('change', () => {
  state.matchMethod = matchMethodSelect.value;
  processAll();
});

// ── Toggle switches ──
toggleGrid.addEventListener('change', () => {
  state.showGrid = toggleGrid.checked;
  renderAll(state.pixelGrid[0].length, state.pixelGrid.length);
});
toggleLabels.addEventListener('change', () => {
  state.showLabels = toggleLabels.checked;
  renderAll(state.pixelGrid[0].length, state.pixelGrid.length);
});

// ── Download buttons ──
downloadGridBtn.addEventListener('click', () => {
  const canvas = document.getElementById('beadCanvas');
  if (!canvas) { showToast('请先生成图纸'); return; }

  // Create a high-res version for download (2x scale)
  const hrCanvas = document.createElement('canvas');
  drawBeadGrid(hrCanvas, state.colorGrid, {
    showGrid: state.showGrid,
    showLabels: state.showLabels,
  });
  // Actually use the same canvas - it's already good quality
  downloadPNG(canvas, `bead-pattern-${state.pixelGrid[0].length}x${state.pixelGrid.length}.png`);
  showToast('图纸已下载！');
});

downloadListBtn.addEventListener('click', () => {
  if (!state.materials) { showToast('请先生成图纸'); return; }
  downloadCSV(state.materials, `material-list-${state.pixelGrid[0].length}x${state.pixelGrid.length}.csv`);
  showToast('材料清单已下载！');
});

// ── Reset ──
resetBtn.addEventListener('click', () => {
  state.originalImage = null;
  state.pixelGrid = null;
  state.colorGrid = null;
  state.materials = null;
  controlsCard.style.display = 'none';
  panelsContainer.style.display = 'none';
  materialsCard.style.display = 'none';
  originalPanel.innerHTML = '<div class="empty-state"><span class="empty-state-icon">📷</span>等待上传</div>';
  pixelatedPanel.innerHTML = '<div class="empty-state"><span class="empty-state-icon">🔲</span>等待处理</div>';
  beadGridPanel.innerHTML = '<div class="empty-state"><span class="empty-state-icon">🧩</span>等待生成</div>';
  materialGrid.innerHTML = '';
  summaryStats.innerHTML = '';
  showToast('已重置，可上传新图片');
});

// ── Keyboard shortcut ──
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's' && state.colorGrid) {
    e.preventDefault();
    const canvas = document.getElementById('beadCanvas');
    if (canvas) downloadPNG(canvas);
  }
});

  'font-size:1.2em;font-weight:bold;color:#FFD93D;',
  'color:#a0a0b8;');
console.log(`%c📦 Mard 标准色库：${MARD_PALETTE.length} 色`, 'color:#00F5D4;');
console.log('%c💡 提示：拖拽图片到上传区，或点击上传按钮', 'color:#FF4D6D;');
console.log('%c⌨️ 快捷键：Ctrl+S 下载图纸', 'color:#a0a0b8;');

// Visual confirmation that JS is running
document.querySelector('.upload-text').textContent = '✅ JS已就绪 · 拖拽图片到此处，或点击上传';
document.querySelector('.upload-zone').style.borderColor = 'rgba(0,245,212,0.5)';
</script>
